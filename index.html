<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>Roots — Encrypted Family Tree Visualizer</title>
    <meta
      name="description"
      content="Create and share encrypted family trees — no accounts, no servers. Your entire tree is stored in the URL, protected by AES-256-GCM encryption."
    />
    <meta name="author" content="Abdulrahman Mahmutoglu" />
    <meta name="robots" content="index, follow" />
    <meta
      name="keywords"
      content="family tree, genealogy, encrypted, privacy, visualization, zero-backend, AES-GCM, Brotli"
    />
    <link rel="canonical" href="https://roots.abdash.net" />

    <!-- Theme & Icons -->
    <meta name="theme-color" content="#1a1a1a" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://roots.abdash.net" />
    <meta
      property="og:title"
      content="Roots — Encrypted Family Tree Visualizer"
    />
    <meta
      property="og:description"
      content="Create and share encrypted family trees — no accounts, no servers. Your entire tree is stored in the URL."
    />
    <meta property="og:image" content="https://roots.abdash.net/og-image.png" />
    <meta property="og:site_name" content="Roots" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://roots.abdash.net" />
    <meta
      name="twitter:title"
      content="Roots — Encrypted Family Tree Visualizer"
    />
    <meta
      name="twitter:description"
      content="Create and share encrypted family trees — no accounts, no servers. Your entire tree is stored in the URL."
    />
    <meta
      name="twitter:image"
      content="https://roots.abdash.net/og-image.png"
    />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Roots",
        "alternateName": "Family Tree Visualizer",
        "url": "https://roots.abdash.net",
        "description": "Zero-backend, encrypted family tree visualizer stored entirely in the URL. No accounts, no servers, no tracking.",
        "applicationCategory": "Utility",
        "operatingSystem": "Any",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        "author": {
          "@type": "Person",
          "name": "Abdulrahman Mahmutoglu",
          "url": "https://abdash.net"
        },
        "license": "https://www.apache.org/licenses/LICENSE-2.0"
      }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
